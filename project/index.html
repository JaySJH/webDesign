<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<title>GTV八大電視 網頁維護中</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<audio id="bgMusic" src="music/bgmusicForPraying.mp3" preload="auto"></audio>
        <!--網頁表頭-->
        <div>
            <img class="headLogo" src="pics/logo_GTV.jpg" alt="GTV Logo">	
        </div>
		
		<!--網頁表身-->
		<!--網頁公告標題，新增容器讓跑馬燈重複跑-->
		<div class="box">
			<div class="list">
				<div class="list-information">ohOHohoh 網站維護中，暫時無法使用~</div>
			</div>
		</div>
		<!--網頁公告內容-->
		<p class="information">讓我們為工程師誠心祈福順利完成維護</p>

		<!--網頁圖片-->
		<div class="prayingbox">
			<div class="list-praying">
				<img class="praying" src="pics/praying.png" alt="祈福">
				<img class="praying" src="pics/praying2.jpg" alt="祈福">
				<img class="praying" src="pics/praying3.png" alt="祈福">
				<img class="praying" src="pics/praying5.png" alt="祈福">
			</div>
			
		</div>

		<!--引入 JavaScript-->
		<script src="script.js"></script>
	</body>
</html>
